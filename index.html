    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Webタイマー",
        "url": "https://timer.wayokan.com/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "description": "作業時間と休憩時間のサイクルを自由に設定できる、シンプルで使いやすい無料のオンラインポモドーロタイマー。",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "JPY"
        }
      }
    </script>

  <body class="bg-gray-50 w-screen min-h-screen flex flex-col md:h-screen">
    <header
      class="w-screen h-12 flex items-center px-4 gap-2 border-b border-gray-400 bg-gray-200 shrink-0"
    >
      <div class="w-1 h-8 border-none bg-black"></div>
      <h1 class="font-black text-lg">Webタイマー</h1>
    </header>
    <main class="flex flex-col md:flex-row flex-1 md:overflow-hidden">
      <div
        class="flex flex-col items-center justify-center flex-1 gap-4 px-4 py-10 md:py-4"
      >
        <p id="mode-label" class="text-4xl font-black text-gray-800">作業中</p>
        <p
          id="time-display"
          class="text-7xl sm:text-8xl md:text-[160px] lg:text-[200px] leading-none tabular-nums"
        >
          00:25:00
        </p>
        <div class="flex flex-wrap items-center justify-center gap-4">
          <button
            id="start-btn"
            type="button"
            class="px-8 py-3 rounded bg-green-500 text-white text-lg hover:bg-green-600"
          >
            開始
          </button>
          <button
            id="pause-btn"
            type="button"
            class="px-8 py-3 rounded bg-blue-500 text-white text-lg hover:bg-blue-600 disabled:opacity-50"
            disabled
          >
            一時停止
          </button>
          <button
            id="reset-btn"
            type="button"
            class="px-8 py-3 rounded bg-red-500 text-white text-lg hover:bg-red-600"
          >
            リセット
          </button>
        </div>
      </div>
      <aside
        class="w-full md:w-64 md:h-full flex flex-col items-center justify-center gap-4 border-t md:border-t-0 md:border-l border-gray-400 px-4 py-8 md:py-0"
      >
        <h2 class="font-black text-lg">設定</h2>
        <label
          class="flex flex-col items-start gap-1 w-48 text-sm text-gray-800"
        >
          作業時間（分）
          <input
            id="work-duration"
            type="number"
            min="1"
            max="180"
            value="25"
            class="w-full rounded border border-gray-400 px-2 py-1 focus:border-black focus:outline-none disabled:opacity-50"
          />
        </label>
        <label
          class="flex flex-col items-start gap-1 w-48 text-sm text-gray-800"
        >
          休憩時間（分）
          <input
            id="short-break-duration"
            type="number"
            min="1"
            max="60"
            value="5"
            class="w-full rounded border border-gray-400 px-2 py-1 focus:border-black focus:outline-none disabled:opacity-50"
          />
        </label>
        <button
          id="apply-btn"
          type="button"
          class="w-48 rounded bg-blue-500 px-4 py-2 text-white hover:bg-blue-600 disabled:opacity-50"
        >
          設定を適用
        </button>
      </aside>
    </main>
    <footer
      class="w-screen h-auto md:h-12 flex flex-col sm:flex-row items-center justify-center border-t border-gray-400 bg-gray-200 gap-2 sm:gap-4 px-4 py-2 shrink-0"
    >

        © 2026 midorin-Linux. All rights reserved.
